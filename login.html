<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartExpense — Login</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="page-auth">
  <div class="auth-wrapper animate-slide-up">
    <div class="auth-header">
      <div class="logo-circle">💰</div>
      <h1 class="brand">SmartExpense</h1>
      <p class="tagline">Take control of your finances</p>
    </div>

    <div class="auth-card">
      <div class="tab-group">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form active-form">
        <div class="form-group">
          <label>📧 Email</label>
          <input type="email" placeholder="your@email.com" class="input-styled" required>
        </div>
        <div class="form-group">
          <label>🔒 Password</label>
          <input type="password" placeholder="Enter password" class="input-styled" required>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox">
            <span>Remember me</span>
          </label>
          <a href="#" class="link-small">Forgot password?</a>
        </div>
        <button type="submit" class="btn primary full">Login</button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="form">
        <div class="form-group">
          <label>👤 Full Name</label>
          <input type="text" placeholder="John Doe" class="input-styled" required>
        </div>
        <div class="form-group">
          <label>📧 Email</label>
          <input type="email" placeholder="your@email.com" class="input-styled" required>
        </div>
        <div class="form-group">
          <label>🔒 Password</label>
          <input type="password" placeholder="Create password" class="input-styled" required>
        </div>
        <div class="form-group">
          <label>🔒 Confirm Password</label>
          <input type="password" placeholder="Confirm password" class="input-styled" required>
        </div>
        <button type="submit" class="btn primary full">Create Account</button>
      </form>

      <div class="or-divider">
        <span>or continue with</span>
      </div>

      <div class="social-buttons">
        <button class="btn social google">
          <span class="social-icon">🔍</span>
          Google
        </button>
        <button class="btn social github">
          <span class="social-icon">🐙</span>
          GitHub
        </button>
      </div>
    </div>

    <div class="auth-footer">
      <p class="muted">🔒 Your data is secure and encrypted</p>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.form').forEach(f => f.classList.remove('active-form'));
        
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.getElementById(tab + 'Form').classList.add('active-form');
      });
    });

    // Form submissions
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    });

    document.getElementById('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
