<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartExpense — Sign In</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">

  <div class="auth-split">
    <div class="auth-left">
      <div class="auth-left-content">
        <div class="auth-brand">
          <div class="auth-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          </div>
          <span>SmartExpense</span>
        </div>
        <h1>Take control of your finances</h1>
        <p>Track spending, manage budgets, and gain insights into your financial health — all in one place.</p>
        <div class="auth-features">
          <div class="auth-feature">
            <div class="auth-feature-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <span>Real-time analytics and insights</span>
          </div>
          <div class="auth-feature">
            <div class="auth-feature-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            </div>
            <span>Smart budget tracking</span>
          </div>
          <div class="auth-feature">
            <div class="auth-feature-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span>Secure, local-first data storage</span>
          </div>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card fade-up">
        <div class="auth-card-header">
          <div class="tab-group">
            <button class="tab-btn active" data-tab="login">Sign In</button>
            <button class="tab-btn" data-tab="signup">Create Account</button>
          </div>
        </div>

        <form id="loginForm" class="auth-form active-form">
          <div class="form-group">
            <label>Email address</label>
            <input type="email" placeholder="you@example.com" class="input-styled" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" class="input-styled" required>
          </div>
          <div class="auth-form-row">
            <label class="checkbox-label">
              <input type="checkbox">
              <span>Remember me</span>
            </label>
            <a href="#" class="link" style="font-size:12px">Forgot password?</a>
          </div>
          <button type="submit" class="btn primary" style="width:100%;justify-content:center;padding:11px">Sign In</button>
        </form>

        <form id="signupForm" class="auth-form">
          <div class="form-group">
            <label>Full name</label>
            <input type="text" placeholder="John Doe" class="input-styled" required>
          </div>
          <div class="form-group">
            <label>Email address</label>
            <input type="email" placeholder="you@example.com" class="input-styled" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create a password" class="input-styled" required>
          </div>
          <div class="form-group">
            <label>Confirm password</label>
            <input type="password" placeholder="Confirm your password" class="input-styled" required>
          </div>
          <button type="submit" class="btn primary" style="width:100%;justify-content:center;padding:11px">Create Account</button>
        </form>

        <div class="divider"><span>or continue with</span></div>

        <div class="social-row">
          <button class="btn outline" style="flex:1;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="btn outline" style="flex:1;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub
          </button>
        </div>

        <p id="authError" style="color:var(--red);font-size:12px;text-align:center;margin-top:12px;display:none"></p>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active-form'));
        this.classList.add('active');
        document.getElementById(this.dataset.tab + 'Form').classList.add('active-form');
      });
    });
    document.getElementById('loginForm').addEventListener('submit', e => { e.preventDefault(); window.location.href = 'dashboard.html'; });
    document.getElementById('signupForm').addEventListener('submit', e => { e.preventDefault(); window.location.href = 'dashboard.html'; });
  </script>
</body>
</html>
